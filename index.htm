<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>happy birthday ♡</title>

    <!-- Aesthetic font combo -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Raleway', sans-serif;
            background: #FFD1DC;
            color: #2d2d2d;
            overflow-x: hidden;
            min-height: 100vh;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><text y='18' font-size='18'>❤️</text></svg>") 12 12, auto;
        }

        /* FLOATING FLOWERS CONTAINER */
        #flowers-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .lotus-img {
            position: absolute;
            width: 50px;
            height: auto;
            opacity: 0.35;
            image-rendering: pixelated;
            animation: float 4s ease-in-out infinite, twinkle 3s ease-in-out infinite;
        }

        /* Sparkle overlay (tiny floating stars) */
        .sparkle {
            position: absolute;
            font-size: 20px;
            opacity: 0.6;
            animation: floatSparkle 2.5s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        @keyframes floatSparkle {
            0% { transform: translateY(0px) scale(0.8); opacity: 0.4; }
            50% { transform: translateY(-12px) scale(1.2); opacity: 0.9; }
            100% { transform: translateY(0px) scale(0.8); opacity: 0.4; }
        }

        /* Pulsing glow on title */
        @keyframes softGlow {
            0%, 100% { text-shadow: 1px 1px 4px rgba(0,0,0,0.08), 0 0 10px #ffe6ea; }
            50% { text-shadow: 1px 1px 4px rgba(0,0,0,0.08), 0 0 20px #ffb3c6; }
        }

        .section {
            display: none;
            padding: 40px 20px;
            min-height: 100vh;
            animation: fadeIn 0.4s ease;
        }

        .active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            text-align: center;
            margin-top: 80px;
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        .title-section {
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 8vw, 64px);
            font-weight: 700;
            letter-spacing: 2px;
            color: #e87d8c;
            animation: softGlow 3s ease-in-out infinite;
            margin-bottom: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        /* No subtext – removed love-text */

        /* ---- CANDLES (commented out, ready for later) ----
        .candle-area { ... }
        ---- END OF CANDLE CSS ---- */

        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 220px);
            gap: 30px;
            justify-content: center;
            position: relative;
            z-index: 1;
            margin-top: 120px;   /* pushed further down for pleasing spacing */
        }

        .btn {
            background: linear-gradient(145deg, #FFB3C6, #FF8FAB);
            border: none;
            padding: 20px 18px;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 143, 171, 0.3);
            position: relative;
            overflow: visible;
            font-family: 'Raleway', sans-serif;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 25px rgba(255, 143, 171, 0.4), 0 0 20px #ffb3c6;
        }

        .swan {
            position: absolute;
            top: -10px;
            left: 12px;
            font-size: 22px;
        }

        .back {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #FF8FAB;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 143, 171, 0.3);
            z-index: 10;
            transition: 0.3s;
            font-family: 'Raleway', sans-serif;
        }

        .back:hover {
            background: #FF7A9E;
            transform: scale(1.05);
        }

        .music-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #FF8FAB;
            border: none;
            color: white;
            font-size: 28px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(255, 143, 171, 0.4);
            cursor: pointer;
            z-index: 999;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .music-btn:hover {
            transform: scale(1.1);
            background: #FF7A9E;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
            margin-top: 40px;
            padding: 0 10px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: #FDE2E4;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(255, 143, 171, 0.15);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            border-radius: 15px;
            min-height: 150px;
            background: #FFD1DC;
            object-fit: cover;
            display: block;
        }

        .caption {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
            min-height: 20px;
            font-weight: 500;
        }

        .text-box {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            line-height: 1.8;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.4);
            padding: 30px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 1;
            font-family: 'Raleway', sans-serif;
        }

        @media (max-width: 600px) {
            .buttons {
                grid-template-columns: 1fr;
                gap: 20px;
                margin-top: 80px;
            }
        }
    </style>
</head>
<body>

    <!-- FLOATING ASSETS CONTAINER -->
    <div id="flowers-container">
        <!-- Lotus images will be injected here -->
    </div>

    <!-- BACKGROUND MUSIC -->
    <audio id="bg-music" loop preload="auto">
        <source src="champagne-coast.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- MUSIC TOGGLE -->
    <button id="music-toggle" class="music-btn" onclick="toggleMusic()">🎵</button>

    <!-- HOME -->
    <div id="home" class="section active">
        <div class="container">
            <div class="title-section">
                <h1>HAPPY BIRTHDAY ♡ </h1>
                <!-- "σαγαπω" removed as requested -->
            </div>

            <!-- CANDLES AREA (commented out) -->
            <!--
            <div class="candle-area" id="candleZone">
                ...
            </div>
            -->

            <div class="buttons">
                <button class="btn" onclick="showSection('moments')"><span class="swan">🦢</span>shakespearness</button>
                <button class="btn" onclick="showSection('chaos')"><span class="swan">🦢</span>favs</button>
                <button class="btn" onclick="showSection('things')"><span class="swan">🦢</span>secret</button>
                <button class="btn" onclick="showSection('last')"><span class="swan">🦢</span>noah & elle</button>
            </div>
        </div>
    </div>

    <!-- SECTION PAGES -->
    <div id="moments" class="section">
        <button class="back" onclick="showSection('home')">← back</button>
        <div class="text-box">
            <!-- shakespearness – add your moments -->
        </div>
    </div>

    <div id="chaos" class="section">
        <button class="back" onclick="showSection('home')">← back</button>
        <h1 style="text-align:center; font-size:50px;">favs</h1>
        <div class="gallery">
            <!-- 12 image slots – replace src with your screenshots -->
            <div class="card"><img src="images/chat1.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat2.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat3.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat4.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat5.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat6.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat7.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat8.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat9.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat10.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat11.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat12.jpg" alt="memory"><div class="caption"></div></div>
        </div>
    </div>

    <div id="things" class="section">
        <button class="back" onclick="showSection('home')">← back</button>
        <div class="text-box">
            <!-- secret – write here -->
        </div>
    </div>

    <div id="last" class="section">
        <button class="back" onclick="showSection('home')">← back</button>
        <div class="text-box">
            <!-- noah & elle – your final surprise -->
        </div>
    </div>

    <script>
        // ---- PAGE NAVIGATION ----
        function showSection(id) {
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(id).classList.add('active');
        }

        // ---- MUSIC TOGGLE ----
        const music = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-toggle');

        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicBtn.textContent = '🔊';
            } else {
                music.pause();
                musicBtn.textContent = '🎵';
            }
        }

        // ---- CANDLE LOGIC (commented out) ----
        // (When you're ready, uncomment the section below and the candle HTML/CSS)
        /*
        const candleRow = document.getElementById('candleRow');
        const big18 = document.getElementById('big18');
        const candlePressText = document.querySelector('.candle-press-text');

        function lightCandles() { ... }
        */

        // ---- FLOATING LOTUS & SPARKLES (positioned around the title) ----
        const container = document.getElementById('flowers-container');
        const lotusSrc = '4AD78C84-7F97-47E6-BF33-939AB322D938.jpeg';

        // Define lotus positions – around the edges, no overlap with center
        const lotusPositions = [
            // top left
            { left: 5, top: 8 },
            { left: 18, top: 3 },
            // top right
            { left: 82, top: 5 },
            { left: 94, top: 12 },
            // left side
            { left: 2, top: 45 },
            { left: 7, top: 75 },
            // right side
            { left: 93, top: 40 },
            { left: 88, top: 80 },
            // bottom left
            { left: 10, top: 92 },
            { left: 22, top: 95 },
            // bottom right
            { left: 85, top: 90 },
            { left: 75, top: 96 },
            // more scattered around the edges
            { left: 30, top: 2 },
            { left: 65, top: 3 },
            { left: 95, top: 60 }
        ];

        lotusPositions.forEach(pos => {
            const img = document.createElement('img');
            img.src = lotusSrc;
            img.alt = 'pixel lotus';
            img.classList.add('lotus-img');
            // add small random offset to feel natural, but stay in the general area
            const offsetX = Math.random() * 4 - 2; // -2 to +2%
            const offsetY = Math.random() * 4 - 2;
            img.style.left = (pos.left + offsetX) + '%';
            img.style.top = (pos.top + offsetY) + '%';
            // each flower gets its own animation delay so they don't move in sync
            img.style.animationDelay = Math.random() * 4 + 's';
            container.appendChild(img);
        });

        // Add floating sparkle emojis (✨) as extra charm
        const sparkleEmojis = [ '⭐'];
        for (let i = 0; i < 8; i++) {
            const spark = document.createElement('span');
            spark.classList.add('sparkle');
            spark.textContent = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
            spark.style.left = Math.random() * 100 + '%';
            spark.style.top = Math.random() * 100 + '%';
            spark.style.animationDelay = Math.random() * 3 + 's';
            spark.style.fontSize = (Math.random() * 20 + 15) + 'px';
            container.appendChild(spark);
        }
    </script>
</body>
</html>

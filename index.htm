<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>happy birthday ♡</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #FFD1DC;  /* baby pink */
            color: #2d2d2d;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* FLOATING FLOWERS CONTAINER */
        #flowers-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        /* REAL IMAGE LOTUS STYLING */
        .lotus-img {
            position: absolute;
            width: 50px;          /* adjust to taste */
            height: auto;
            opacity: 0.35;
            image-rendering: pixelated;  /* keeps it crisp if it's pixel art */
            animation-name: float;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }

        /* FLOATING ANIMATION */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .section {
            display: none;
            padding: 40px 20px;
            min-height: 100vh;
            animation: fadeIn 0.4s ease;
        }

        .active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            text-align: center;
            margin-top: 100px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 60px;
            margin-bottom: 60px;
            font-weight: 700;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(2, 220px);
            gap: 30px;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .btn {
            background: linear-gradient(145deg, #FFB3C6, #FF8FAB);
            border: none;
            padding: 20px 18px;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 143, 171, 0.3);
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 25px rgba(255, 143, 171, 0.4);
        }

        .back {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #FF8FAB;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 143, 171, 0.3);
            z-index: 10;
            transition: 0.3s;
        }

        .back:hover {
            background: #FF7A9E;
            transform: scale(1.05);
        }

        /* MUSIC BUTTON */
        .music-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #FF8FAB;
            border: none;
            color: white;
            font-size: 28px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(255, 143, 171, 0.4);
            cursor: pointer;
            z-index: 999;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .music-btn:hover {
            transform: scale(1.1);
            background: #FF7A9E;
        }

        /* GALLERY */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
            margin-top: 40px;
            padding: 0 10px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: #FDE2E4;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(255, 143, 171, 0.15);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            border-radius: 15px;
            min-height: 150px;
            background: #FFD1DC;
            object-fit: cover;
            display: block;
        }

        .caption {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
            min-height: 20px;
            font-weight: 500;
        }

        .text-box {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            line-height: 1.8;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.4);
            padding: 30px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 1;
        }

        @media (max-width: 500px) {
            .buttons {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            h1 {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>

    <!-- FLOATING LOTUS FLOWERS (real image) -->
    <div id="flowers-container"></div>

    <!-- BACKGROUND MUSIC (hidden) -->
    <audio id="bg-music" loop preload="auto">
        <source src="champagne-coast.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- MUSIC TOGGLE BUTTON -->
    <button id="music-toggle" class="music-btn" onclick="toggleMusic()">🎵</button>

    <!-- HOME -->
    <div id="home" class="section active">
        <div class="container">
            <h1>HAPPY BIRTHDAY 💘</h1>

            <div class="buttons">
                <button class="btn" onclick="showSection('moments')">LITTLE MOMENTS</button>
                <button class="btn" onclick="showSection('chaos')">OUR CHAOS</button>
                <button class="btn" onclick="showSection('things')">THINGS ABOUT U</button>
                <button class="btn" onclick="showSection('last')">ONE LAST THING</button>
            </div>
        </div>
    </div>

    <!-- LITTLE MOMENTS -->
    <div id="moments" class="section">
        <button class="back" onclick="showSection('home')">← back</button>
        <div class="text-box">
            <!-- write your moments here -->
        </div>
    </div>

    <!-- OUR CHAOS -->
    <div id="chaos" class="section">
        <button class="back" onclick="showSection('home')">← back</button>
        <h1 style="text-align:center;">our chaos</h1>

        <div class="gallery">
            <!-- 12 image slots – replace src with your real screenshots -->
            <div class="card"><img src="images/chat1.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat2.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat3.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat4.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat5.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat6.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat7.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat8.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat9.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat10.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat11.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat12.jpg" alt="memory"><div class="caption"></div></div>
        </div>
    </div>

    <!-- THINGS ABOUT U -->
    <div id="things" class="section">
        <button class="back" onclick="showSection('home')">← back</button>
        <div class="text-box">
            <!-- write about them here -->
        </div>
    </div>

    <!-- ONE LAST THING -->
    <div id="last" class="section">
        <button class="back" onclick="showSection('home')">← back</button>
        <div class="text-box">
            <!-- your final message -->
        </div>
    </div>

    <script>
        // ---- PAGE NAVIGATION ----
        function showSection(id) {
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(id).classList.add('active');
        }

        // ---- MUSIC TOGGLE ----
        const music = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-toggle');

        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicBtn.textContent = '🔊';
            } else {
                music.pause();
                musicBtn.textContent = '🎵';
            }
        }

        // ---- CREATE FLOATING LOTUS FLOWERS (YOUR IMAGE) ----
        const container = document.getElementById('flowers-container');
        const numberOfFlowers = 15;

        for (let i = 0; i < numberOfFlowers; i++) {
            const img = document.createElement('img');
            img.src = '4AD78C84-7F97-47E6-BF33-939AB322D938.jpeg';
            img.alt = 'pixel lotus';
            img.classList.add('lotus-img');

            // random position
            img.style.left = Math.random() * 100 + '%';
            img.style.top = Math.random() * 100 + '%';

            // random animation speed and delay for organic movement
            img.style.animationDuration = (Math.random() * 3 + 3) + 's'; // 3–6 seconds
            img.style.animationDelay = Math.random() * 5 + 's';

            container.appendChild(img);
        }
    </script>

</body>
</html>

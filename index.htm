<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>happy birthday ♡</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Raleway:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Raleway', sans-serif;
            background: #FFD1DC;
            color: #2d2d2d;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #flowers-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .lotus-img {
            position: absolute;
            width: 50px;
            height: auto;
            opacity: 0.35;
            image-rendering: pixelated;
            animation-name: float;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .section {
            display: none;
            padding: 40px 20px;
            min-height: 100vh;
            animation: fadeIn 0.4s ease;
        }

        .active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            text-align: center;
            margin-top: 50px;
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        .title-section {
            margin-bottom: 50px;  /* more breathing room */
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 8vw, 64px);
            font-weight: 700;
            letter-spacing: 2px;
            color: #e87d8c;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.08);
            margin-bottom: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        .love-text {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 700;
            color: #000;
            text-shadow: 1px 1px 6px rgba(0,0,0,0.1);
            margin-top: 8px;
            letter-spacing: 2px;
            font-style: italic;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin-top: 10px;
            z-index: 1;
            position: relative;
        }

        .btn {
            background: linear-gradient(145deg, #FFB3C6, #FF8FAB);
            border: none;
            padding: 20px 40px;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 143, 171, 0.3);
            position: relative;
            overflow: visible;
            width: 260px;
            text-align: center;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 25px rgba(255, 143, 171, 0.4);
        }

        .swan {
            position: absolute;
            top: -10px;
            left: 12px;
            font-size: 22px;
        }

        .back {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #FF8FAB;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 143, 171, 0.3);
            z-index: 10;
            transition: 0.3s;
        }

        .back:hover {
            background: #FF7A9E;
            transform: scale(1.05);
        }

        .music-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #FF8FAB;
            border: none;
            color: white;
            font-size: 28px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(255, 143, 171, 0.4);
            cursor: pointer;
            z-index: 999;
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .music-btn:hover {
            transform: scale(1.1);
            background: #FF7A9E;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
            margin-top: 40px;
            padding: 0 10px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: #FDE2E4;
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(255, 143, 171, 0.15);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            border-radius: 15px;
            min-height: 150px;
            background: #FFD1DC;
            object-fit: cover;
            display: block;
        }

        .caption {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
            min-height: 20px;
            font-weight: 500;
        }

        .text-box {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            line-height: 1.8;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.4);
            padding: 30px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            position: relative;
            z-index: 1;
        }

        @media (max-width: 600px) {
            .btn {
                width: 220px;
            }
        }
    </style>
</head>
<body>

    <div id="flowers-container"></div>

    <audio id="bg-music" loop preload="auto">
        <source src="champagne-coast.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <button id="music-toggle" class="music-btn" onclick="toggleMusic()">🎵</button>

    <!-- HOME -->
    <div id="home" class="section active">
        <div class="container">
            <div class="title-section">
                <h1>HAPPY BIRTHDAY ❤️</h1>
                <p class="love-text">σαγαπω</p>
            </div>

            <!-- CANDLES COMMENTED OUT 
            <div class="candle-area" id="candleZone">...</div>
            -->

            <div class="buttons">
                <button class="btn" onclick="showSection('moments')"><span class="swan">🦢</span>shakespearness</button>
                <button class="btn" onclick="showSection('chaos')"><span class="swan">🦢</span>favs</button>
                <button class="btn" onclick="showSection('things')"><span class="swan">🦢</span>secret</button>
                <button class="btn" onclick="showSection('last')"><span class="swan">🦢</span>noah & elle</button>
            </div>
        </div>
    </div>

    <div id="moments" class="section">
        <button class="back" onclick="showSection('home')">← back</button>
        <div class="text-box">
            <!-- write shakespearness stuff here -->
        </div>
    </div>

    <div id="chaos" class="section">
        <button class="back" onclick="showSection('home')">← back</button>
        <h1 style="text-align:center; font-size:50px;">favs</h1>
        <div class="gallery">
            <div class="card"><img src="images/chat1.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat2.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat3.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat4.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat5.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat6.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat7.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat8.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat9.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat10.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat11.jpg" alt="memory"><div class="caption"></div></div>
            <div class="card"><img src="images/chat12.jpg" alt="memory"><div class="caption"></div></div>
        </div>
    </div>

    <div id="things" class="section">
        <button class="back" onclick="showSection('home')">← back</button>
        <div class="text-box">
            <!-- secret message -->
        </div>
    </div>

    <div id="last" class="section">
        <button class="back" onclick="showSection('home')">← back</button>
        <div class="text-box">
            <!-- noah & elle final surprise -->
        </div>
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(id).classList.add('active');
        }

        const music = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-toggle');

        function toggleMusic() {
            if (music.paused) {
                music.play();
                musicBtn.textContent = '🔊';
            } else {
                music.pause();
                musicBtn.textContent = '🎵';
            }
        }

        /* ========== SMART LOTUS PLACEMENT ========== */
        const container = document.getElementById('flowers-container');
        const numberOfFlowers = 15;

        // Grid dimensions
        const cols = 5;
        const rows = 4;
        const cellWidth = 100 / cols;   // 20%
        const cellHeight = 100 / rows;  // 25%

        // Define the "no-fly zone" for the title area (approx)
        const titleZone = {
            top: 5,      // start at 5% of viewport height
            bottom: 35,  // end at 35%
            left: 15,    // 15% from left
            right: 85    // 85% from left
        };

        // Build a list of all cell indices that are allowed (outside title zone)
        const allowedCells = [];
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                // Calculate cell boundaries in percentage
                const cellLeft = c * cellWidth;
                const cellRight = (c + 1) * cellWidth;
                const cellTop = r * cellHeight;
                const cellBottom = (r + 1) * cellHeight;

                // Check if cell overlaps the title zone
                const overlaps = !(cellRight < titleZone.left ||
                                   cellLeft > titleZone.right ||
                                   cellBottom < titleZone.top ||
                                   cellTop > titleZone.bottom);

                if (!overlaps) {
                    allowedCells.push({ row: r, col: c });
                }
            }
        }

        // Shuffle allowed cells and pick the first 15
        const shuffled = allowedCells.sort(() => Math.random() - 0.5);
        const chosenCells = shuffled.slice(0, Math.min(numberOfFlowers, allowedCells.length));

        chosenCells.forEach(cell => {
            const img = document.createElement('img');
            img.src = '4AD78C84-7F97-47E6-BF33-939AB322D938.jpeg';
            img.alt = 'pixel lotus';
            img.classList.add('lotus-img');

            // Place flower at cell center + small random offset (looks natural)
            const baseX = (cell.col + 0.5) * cellWidth;
            const baseY = (cell.row + 0.5) * cellHeight;
            const offsetX = (Math.random() - 0.5) * cellWidth * 0.6;   // 60% jitter within cell
            const offsetY = (Math.random() - 0.5) * cellHeight * 0.6;

            img.style.left = baseX + offsetX + '%';
            img.style.top = baseY + offsetY + '%';

            // Slightly varied animation
            img.style.animationDuration = (Math.random() * 3 + 3) + 's';
            img.style.animationDelay = Math.random() * 5 + 's';

            container.appendChild(img);
        });
    </script>
</body>
</html>
